                type: string
              industry_keywords:
                description: 行业关键词，用于行业识别和竞品分析，例如 民航、智慧运维、预测性维护
                items:
                  type: string
                type: array
              innovation_points:
                description: 项目宣称的创新点，必须拆成数组，每个点一句话
                items:
                  type: string
                type: array
