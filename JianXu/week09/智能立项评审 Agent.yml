                additionalProperties: false
                description: 用于制度知识库检索和审批流程判断的结构化信息，不用于展示，而是用于RAG召回
                properties:
                  budget_amount_num:
                    description: 提取后的数值金额（单位：万元），例如“100万元”提取为100；如果无法确定则填0
                    type: number
                  budget_amount_raw:
                    description: 原始金额文本，例如“100万元”
                    type: string
                  budget_sources:
                    description: 资金来源，例如 集团补助、自有资金、其他资金；可以多个
                    items:
                      type: string
                    type: array
                  collaboration_amount_num:
                    description: 协作费金额数值（单位：万元）
                    type: number
                  collaboration_amount_raw:
                    description: 协作费或外部合作费用金额原文
                    type: string
                  equipment_purchase_amount_num:
                    description: 设备购置费数值（单位：万元），无法确定则填0
                    type: number
                  equipment_purchase_amount_raw:
                    description: 设备购置费金额原文，例如“20万元”，没有则为空字符串
                    type: string
                  has_equipment_purchase:
                    description: 是否包含设备购置费，如果预算中出现设备购置费则为true
                    type: boolean
                  has_external_collaboration:
                    description: 是否存在协作费/外部合作/第三方服务费用
                    type: boolean
                  is_tech_innovation_project:
                    description: 是否属于科技创新项目，如果project_type中包含“科技创新”则为true
                    type: boolean
                  project_stage:
                    description: 项目阶段，例如 立项、变更、结题。本任务默认填写“立项”
                    type: string
                  requires_budget_rule_check:
                    description: 是否需要匹配预算审批制度（所有项目一般为true）
                    type: boolean
                  requires_fixed_asset_rule_check:
                    description: 如果存在设备购置，则为true，用于触发固定资产投资制度检索
                    type: boolean
                  requires_tech_project_rule_check:
                    description: 是否需要匹配科技创新项目管理制度，如果是科技创新项目则为true
                    type: boolean
                  retrieval_hints:
                    description: 用于知识库检索的关键词提示，例如 科技创新项目、100万元、审批、总经理办公会、设备购置
                    items:
                      type: string
                    type: array
                  retrieval_query_seed:
                    description: 用于直接进行知识库召回的查询字符串，将关键条件拼接为一句话，例如“科技创新项目 100万元 立项
                      审批权限 总经理办公会”
                    type: string
                required:
                - project_stage
                - is_tech_innovation_project
                - budget_amount_raw
                - budget_amount_num
                - budget_sources
                - has_equipment_purchase
                - has_external_collaboration
                - requires_tech_project_rule_check
                - requires_budget_rule_check
                - requires_fixed_asset_rule_check
                - retrieval_hints
                - retrieval_query_seed
                type: object
              project_background:
                description: 项目背景，对项目为什么要做进行总结
                type: string
              project_goal:
                description: 项目目标，说明项目要达成的核心目的
                type: string
              project_name:
                description: 项目名称，必须从原文中准确提取
                type: string
              project_type:
                description: 项目类型，例如 科技创新项目、采购项目、信息化项目等，必须尽量从原文判断
                type: string
            required:
            - project_name
            - project_background
