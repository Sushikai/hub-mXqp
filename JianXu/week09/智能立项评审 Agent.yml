        - id: 6a3c5f39-f3a6-463b-b78b-5553d709fbb2
          role: system
          text: '请从以下立项书内容中提取关键信息，并严格按照 JSON 输出。


            提取字段要求：

            1. project_name：项目名称

            2. project_background：项目背景

            3. project_goal：项目目标

            4. core_technology：核心技术描述

            5. innovation_points：项目宣称的创新点，输出数组

            6. application_scenario：应用场景

            7. budget：项目金额，如无法明确识别请输出原文中最可能相关的金额描述

            8. expected_benefit：预期收益/价值

            9. industry_keywords：与行业相关的关键词，输出数组

            10.project_type: 项目的类型


            要求：

            - 只输出 JSON

            - 不要添加解释

            - 如果某字段缺失，填空字符串或空数组

            '
