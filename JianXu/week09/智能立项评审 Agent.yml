app:
  description: '本项目基于大语言模型与企业知识库构建一个智能立项评审 Agent，支持员工提交项目立项书后，自动完成创新性评估、市场价值分析及流程合规判断。


    Agent 能够解析立项书中的项目内容，从技术创新、专利可行性、行业归属、市场竞品以及公司制度流程等多个维度进行综合分析，并输出结构化评审报告，辅助企业决策，提高立项审核效率与质量。'
  icon: 🤖
  icon_background: '#FFEAD5'
  icon_type: emoji
  mode: advanced-chat
  name: 智能立项评审 Agent
  use_icon_as_answer_icon: false
